spring:
  application:
    name: Payment-service

server:
 port: 8082
 
 eureka:
   client:
     service-url:
       defaultZone: http://localhost:8761/eureka/
       
       
       spring:
         kafka:
           bootstrap-servers: localhost:9092
           consumer:
             group-id: payment-group
             auto-offset-reset: earliest